# ─── Servidor ────────────────────────────────────────────────
server.port=8080

# ─── MySQL ───────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/leads_db?useSSL=false&serverTimezone=America/Mexico_City&allowPublicKeyRetrieval=true
spring.datasource.username=admin
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ─── Kafka ───────────────────────────────────────────────────
spring.kafka.enabled=false
spring.kafka.bootstrap-servers=localhost:9092
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

spring.kafka.consumer.group-id=leads-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.leads.dto

# Topics
kafka.topics.messages-incoming=messages.incoming
kafka.topics.messages-processed=messages.processed
kafka.topics.leads-new=leads.new

# ─── Meta / Facebook ─────────────────────────────────────────
meta.app-id=TU_APP_ID
meta.app-secret=TU_APP_SECRET
meta.verify-token=TU_VERIFY_TOKEN_SECRETO
meta.redirect-uri=https://tudominio.com/auth/callback
meta.graph-api-url=https://graph.facebook.com/v19.0

# ─── WebSocket ───────────────────────────────────────────────
websocket.allowed-origins=*

# ─── Scheduler de tokens ─────────────────────────────────────
token.refresh.days-before-expiry=10

# ─── Logging ─────────────────────────────────────────────────
logging.level.com.leads=DEBUG
logging.level.org.springframework.kafka=INFO
