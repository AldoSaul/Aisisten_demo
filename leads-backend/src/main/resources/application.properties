# ─── Servidor ────────────────────────────────────────────────
server.port=8080

# ─── MySQL ───────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/leads_db?useSSL=false&serverTimezone=America/Mexico_City&allowPublicKeyRetrieval=true
spring.datasource.username=admin
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Jackson — serialize LocalDateTime as ISO-8601 strings, not arrays
# Note: write-dates-as-timestamps was removed in Jackson 3.x (Spring Boot 4.x)
# ISO-8601 output is now controlled via JacksonConfig bean (see config package)
spring.jackson.deserialization.fail-on-unknown-properties=false

# Disable open-in-view (forces explicit @Transactional, avoids hidden lazy queries)
spring.jpa.open-in-view=false

# Seed dev data — set to 'never' in production
# defer ensures Hibernate creates/updates tables BEFORE data.sql runs
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ─── Kafka ───────────────────────────────────────────────────
spring.kafka.enabled=false
spring.kafka.bootstrap-servers=localhost:9092
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

spring.kafka.consumer.group-id=leads-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.leads.dto,com.leads.integration.dto

# Topics
kafka.topics.messages-incoming=messages.incoming
kafka.topics.messages-processed=messages.processed
kafka.topics.leads-new=leads.new
kafka.topics.integrations-webhook-normalized=integrations.webhook.normalized

# ─── Meta / Facebook ─────────────────────────────────────────
meta.app-id=TU_APP_ID
meta.app-secret=TU_APP_SECRET
meta.verify-token=TU_VERIFY_TOKEN_SECRETO
meta.redirect-uri=https://tudominio.com/auth/callback
meta.graph-api-url=https://graph.facebook.com/v19.0

# ─── WebSocket ───────────────────────────────────────────────
websocket.allowed-origins=*

# ─── Scheduler de tokens ─────────────────────────────────────
token.refresh.days-before-expiry=10

# ─── JWT (replace this secret in production) ─────────────────
app.jwt.secret=CHANGE_THIS_DEV_SECRET_WITH_A_LONG_RANDOM_VALUE_AT_LEAST_32_CHARS
app.jwt.expiration-ms=3600000

# ─── Actuator ───────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always

# ─── Logging ─────────────────────────────────────────────────
logging.level.com.leads=DEBUG
logging.level.org.springframework.kafka=INFO
