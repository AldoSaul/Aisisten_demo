# ==============================================================================
# Meta Graph API Integration - Application Configuration
# ==============================================================================
#
# HOW TO RUN:
#   1. Replace meta.app-id and meta.app-secret with your real Facebook App credentials.
#   2. Make sure your Facebook App has "Facebook Login" enabled and the redirect URI
#      matches meta.redirect-uri below.
#   3. Run: mvn spring-boot:run
#   4. Open in browser: http://localhost:8080/auth/meta/login
#
# TEST URLs:
#   - Login:      http://localhost:8080/auth/meta/login
#   - Test /me:   http://localhost:8080/auth/meta/test
#   - Debug:      http://localhost:8080/auth/meta/debug
#   - Ad Account: http://localhost:8080/meta/ad-account?adAccountId=123456789012345
# ==============================================================================

server.port=8080

# Facebook / Meta App credentials (replace with your real values)
meta.app-id=951177067297140
meta.app-secret=49a3bb38e6fe6b27ba18c4285b57f1a0

# OAuth redirect URI — must match the one configured in the Facebook App dashboard
meta.redirect-uri=http://localhost:8080/auth/meta/callback
